# Database Keep-Alive Workflow — Brain Cloud Prototype
# Performs WRITE operations on free-tier databases to prevent auto-pause
#
# Schedule: Runs DAILY at 3:47 AM CST (9:47 AM UTC)
# (Offset from neurow-hq's 3:17 AM to avoid overlapping runs)
#
# Free tier pause thresholds:
#   - Neo4j Aura: 3 days inactive (strictest)
#   - Qdrant Cloud: 7 days inactive
#   - Supabase: 7 days inactive
#
# REQUIRED secret: DATABASE_URL (Supabase direct Postgres connection)
# OPTIONAL secrets: NEO4J_URI, NEO4J_USERNAME, NEO4J_PASSWORD, QDRANT_URL, QDRANT_API_KEY
#
# Note: Neo4j and Qdrant are shared instances also pinged by neurow-hq.
# Including them here provides redundancy — if either repo's workflow fails,
# the other still prevents pause.

name: Database Keep-Alive

on:
  schedule:
    - cron: '47 9 * * *'  # Every day at 9:47 AM UTC (3:47 AM CST)

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  keepalive:
    name: Ping Databases
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary neo4j qdrant-client

      - name: Run keep-alive check
        env:
          # Required — direct Postgres connection (bypasses PostgREST)
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

          # Optional — shared instances (redundant with neurow-hq pings)
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: python scripts/database_keepalive.py

      - name: Report status
        if: always()
        run: |
          echo "::notice::Database keep-alive completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
